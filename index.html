<!DOCTYPE html>

    <style>

        body { background-color: #ffffff; margin: 0; padding: 0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* HEADER / MENU */
        nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }

        .hero-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }
        .main-art {
            width: 100%;
            height: auto;

        }

        /* AJUSTE MILIMÉTRICO DO BOTÃO NO IPHONE */
        .btn-overlay {
            position: absolute;
            top: 72.5%; /* Calibrado para o centro da tela do iPhone na arte */
            left: 22.8%;
            transform: translate(-50%, -50%);
            width: 160px;
        }

        @media (max-width: 1024px) {
            .btn-overlay { position: static; transform: none; text-align: center; padding: 20px 0; width: 100%; }
        }
    </style>
</head>

                    <div class="text-6xl font-[900] mb-12 tracking-tighter">R$ 19,90<span class="text-sm font-normal text-gray-300">/mês</span></div>

                    <div class="text-6xl font-[900] mb-12 tracking-tighter">R$ 29,90<span class="text-sm font-normal text-gray-600">/mês</span></div>
