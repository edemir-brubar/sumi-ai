<!DOCTYPE html>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #ffffff; margin: 0; padding: 0; font-family: sans-serif; }
        
        /* A SEÇÃO HERO USA A SUA ARTE COMO FUNDO REAL */
        .hero-final {
            background-image: url('arte-final.png');
            background-size: contain;
            background-position: center top;
            background-repeat: no-repeat;
            width: 100%;
            aspect-ratio: 1920 / 1080; /* Mantém a proporção da sua arte */
            position: relative;
        }

        /* Botão azul sobreposto à imagem */
        .btn-posicao {
            position: absolute;
            top: 52%; /* Ajustado para ficar sobre o 'você sabe' da imagem */
            left: 23%;
            transform: translate(-50%, -50%);
        }

        @media (max-width: 1024px) {
            .hero-final { background-size: cover; aspect-ratio: auto; min-height: 60vh; }
            .btn-posicao { position: relative; top: 0; left: 0; transform: none; text-align: center; padding: 40px 0; }
        }
    </style>
</head>
