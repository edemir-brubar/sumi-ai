<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUMI | você sabe. antes.</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #fff; overflow-x: hidden; display: flex; justify-content: center; }
        
        .main-container {
            position: relative;
            width: 100%;
            max-width: 1280px; /* Mantém a proporção de elite */
            margin: 0 auto;
        }

        .arte-final {
            width: 100%;
            height: auto;
            display: block;
        }

        /* O BOTÃO "COMECE AGORA" - Ajustado para ficar sobre o celular */
        .btn-comecar {
            position: absolute;
            top: 78%; /* Ajuste fino para a posição vertical */
            left: 50%; /* Centraliza horizontalmente */
            transform: translateX(-50%); /* Garante o centro exato */
            width: 220px;
            height: 55px;
            background: #007AFF; /* Azul Royal Apple */
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            font-family: -apple-system, sans-serif;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 10px 20px rgba(0,102,255,0.3);
            transition: all 0.3s ease;
        }

        .btn-comecar:hover {
            background: #0056b3;
            transform: translateX(-50%) scale(1.05);
        }
    </style>
</head>
<body>

    <div class="main-container">
        <img src="arte-final.png" class="arte-final" alt="SUMI Intelligence">
        
        <a href="https://wa.me/seunumeroaqui" class="btn-comecar">COMECE AGORA</a>
    </div>

</body>
</html>
