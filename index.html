<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUMI | Inteligência que faz o excesso de e-mails sumir</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .bg-glass { background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(15px); }
        .gradient-text { background: linear-gradient(90deg, #4F46E5, #9333EA); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="bg-[#FDFDFF] text-slate-900">

    <nav class="fixed top-0 w-full z-50 bg-glass border-b border-slate-100">
        <div class="max-w-6xl mx-auto px-6 py-2 flex justify-between items-center">
            <div class="flex items-center">
                <img src="logo-sumi.png" alt="SUMI Logo" class="h-32 w-auto object-contain transform scale-125 origin-left">
            </div>
            <a href="#assinar" class="bg-indigo-600 text-white px-8 py-3 rounded-full font-bold text-sm hover:bg-indigo-800 transition-all shadow-lg shadow-indigo-100">ASSINAR AGORA</a>
        </div>
    </nav>

    <section class="pt-64 pb-24 px-6 text-center">
        <div class="max-w-5xl mx-auto">
            <span class="bg-indigo-50 text-indigo-600 px-4 py-2 rounded-full text-xs font-bold uppercase tracking-widest mb-8 inline-block italic">Tecnologia Brubar Brasil</span>
            <h1 class="text-6xl md:text-8xl font-black text-slate-900 mb-8 tracking-tight leading-[1.1]">
                Faça o caos dos e-mails <span class="gradient-text uppercase">sumir</span>.
            </h1>
            <p class="text-xl text-slate-500 mb-12 max-w-2xl mx-auto font-medium">
                Receba resumos inteligentes de qualquer e-mail direto no seu WhatsApp. <br><b>Rápido, seguro e essencial.</b>
            </p>
            
            <div id="assinar" class="bg-white p-10 rounded-[3rem] shadow-2xl shadow-indigo-100 border border-slate-50 max-w-xl mx-auto text-left">
                <form id="sumiForm" class="flex flex-col gap-4">
                    <h3 class="text-xl font-bold text-slate-800 text-center mb-2">Inicie sua experiência hoje</h3>
                    <input type="email" name="email" id="emailInput" required placeholder="Seu melhor e-mail corporativo" class="w-full p-6 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-indigo-500 outline-none transition text-lg text-slate-700 text-center font-semibold">
                    <button type="submit" id="btnSubmit" class="w-full bg-indigo-600 text-white font-black py-6 rounded-2xl text-2xl hover:bg-indigo-700 shadow-xl shadow-indigo-200 transition-all">
                        Ativar meu SUMI
                    </button>
                </form>
            </div>
        </div>
    </section>

    <footer class="py-20 text-center text-slate-400 text-sm border-t border-slate-50">
        <img src="logo-sumi.png" alt="SUMI Logo" class="h-24 w-auto mx-auto mb-6 opacity-90">
        <p class="font-bold mb-2 uppercase tracking-tighter text-indigo-600">SUMI - Brubar Brasil</p>
        <p>© 2026 • Inteligência em Produtividade</p>
    </footer>

    <script>
        const form = document.getElementById('sumiForm');
        const btn = document.getElementById('btnSubmit');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerHTML = "Processando Tecnologia...";
            const formData = new FormData(form);
            try {
                const response = await fetch('https://formspree.io/f/xvzwwlgr', {
                    method: 'POST',
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });
                if (response.ok) {
                    alert('🎉 Sucesso! A Brubar recebeu seu cadastro. Verifique sua caixa de entrada!');
                    form.reset();
                } else {
                    alert('Ops! Algo deu errado.');
                }
            } catch (error) {
                alert('Erro de conexão.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = "Ativar meu SUMI";
            }
        });
    </script>

</body>
</html>
